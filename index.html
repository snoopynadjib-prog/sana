<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Sana Quiz 💘 | How Much Do You Love Her?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a0b2e 0%, #0d0518 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
            position: relative;
            cursor: crosshair;
        }

        /* Animated background hearts */
        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-heart {
            position: absolute;
            font-size: 30px;
            opacity: 0.1;
            animation: floatBg 15s linear infinite;
        }

        @keyframes floatBg {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0.05; }
            50% { opacity: 0.15; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* Main quiz container */
        .quiz-container {
            position: relative;
            z-index: 10;
            background: rgba(20, 8, 35, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 64px;
            padding: 2rem 2.5rem;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,105,180,0.3), 0 0 60px rgba(255,50,100,0.2);
            max-width: 800px;
            width: 90%;
            margin: 20px;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #ffb7c5, #ff6a88, #ff3b5c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }

        .sana-name {
            font-size: 1rem;
            color: #ff99bb;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
        }

        /* Progress bar */
        .progress-area {
            margin: 1rem 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6a88, #ffb7c5);
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 10px;
        }

        .question-counter {
            font-size: 0.8rem;
            color: #ffaacc;
            margin-top: 0.5rem;
        }

        /* Question box */
        .question-card {
            margin: 1.8rem 0;
            padding: 0.5rem;
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff0f5;
            text-shadow: 0 0 8px #ff88aa;
            line-height: 1.4;
            margin-bottom: 0.5rem;
        }

        .question-sub {
            font-size: 0.85rem;
            color: #cc99bb;
        }

        /* Answer buttons area */
        .answers-area {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 2rem 0;
            min-height: 150px;
            position: relative;
        }

        .answer-btn {
            padding: 14px 32px;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.1);
            color: #ffdddd;
            border: 1px solid rgba(255,100,150,0.4);
            backdrop-filter: blur(4px);
        }

        .answer-btn.correct {
            background: linear-gradient(135deg, #ff4d6d, #c9184a);
            color: white;
            box-shadow: 0 5px 20px rgba(255,50,80,0.5);
        }

        .answer-btn.wrong {
            background: linear-gradient(135deg, #3a2a4a, #2a1a3a);
            color: #aa88aa;
            border-color: rgba(255,80,120,0.3);
            position: relative;
        }

        .answer-btn:hover:not(.moving) {
            transform: scale(1.03);
        }

        /* Score and next section */
        .score-area {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #ffbbdd;
        }

        .next-btn {
            background: linear-gradient(135deg, #ff6a88, #d42e5a);
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            font-size: 1rem;
            transition: 0.2s;
            display: inline-block;
        }

        .next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,50,80,0.6);
        }

        .next-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* Results screen */
        .results-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #ff6a88, #4a0e2a);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
            backdrop-filter: blur(10px);
        }

        .results-screen.active {
            opacity: 1;
            visibility: visible;
        }

        .results-content {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(20px);
            padding: 2.5rem 3rem;
            border-radius: 60px;
            text-align: center;
            border: 2px solid #ffdd99;
            animation: bounceIn 0.5s ease;
            max-width: 500px;
            margin: 20px;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            80% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }

        .results-content h2 {
            font-size: 2.5rem;
            color: #ffddaa;
            margin-bottom: 1rem;
        }

        .final-score {
            font-size: 3rem;
            font-weight: bold;
            color: #ff88aa;
            margin: 1rem 0;
        }

        .sana-final-message {
            font-size: 1.3rem;
            color: #ffe0f0;
            margin: 1rem 0;
            font-family: 'Dancing Script', cursive;
        }

        .restart-btn {
            margin-top: 1.5rem;
            background: #ff6a88;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }

        /* Tease message */
        .tease-area {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #ff99bb;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 5px 16px;
            border-radius: 40px;
            font-family: monospace;
        }

        @media (max-width: 650px) {
            .quiz-container { padding: 1.2rem; }
            .question-text { font-size: 1.2rem; }
            .answer-btn { padding: 8px 18px; font-size: 0.9rem; }
            .results-content { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="floating-bg" id="bgHearts"></div>

    <div class="quiz-container">
        <h1>💗 THE SANA QUIZ 💗</h1>
        <div class="sana-name">prove your love for Sana</div>

        <div class="progress-area">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-counter" id="questionCounter">Question 1 / 10</div>
        </div>

        <div class="question-card">
            <div class="question-text" id="questionText">Loading...</div>
            <div class="question-sub" id="questionSub">🌸 choose wisely 🌸</div>
        </div>

        <div class="answers-area" id="answersArea"></div>

        <div class="score-area" id="scoreArea">❤️ Score: 0 / 10</div>
        <div class="tease-area" id="teaseMessage">💋 Wrong answers run away... try to catch them? 💋</div>
        
        <button class="next-btn" id="nextBtn" disabled>▶ Next Question</button>
    </div>

    <div class="results-screen" id="resultsScreen">
        <div class="results-content">
            <h2>💖 QUIZ COMPLETE! 💖</h2>
            <div class="final-score" id="finalScore">0 / 10</div>
            <div class="sana-final-message" id="sanaMessage"></div>
            <button class="restart-btn" id="restartBtn">🌹 Play Again for Sana 🌹</button>
        </div>
    </div>

    <script>
        // ========== QUESTIONS DATABASE ==========
        const questions = [
            {
                text: "Does your heart beat faster when you see Sana?",
                sub: "💓 be honest...",
                correct: "YES! Every single time 💓",
                wrongAnswers: ["No, not really", "Maybe sometimes", "I don't know", "Not at all"]
            },
            {
                text: "Is Sana the most beautiful girl in the world?",
                sub: "🌹 there's only one right answer...",
                correct: "ABSOLUTELY YES! 🌹",
                wrongAnswers: ["She's okay", "No", "I prefer others", "Not sure"]
            },
            {
                text: "Do you think about Sana before falling asleep?",
                sub: "🌙 be real...",
                correct: "Every single night! 🌙",
                wrongAnswers: ["Never", "Rarely", "Only sometimes", "I forget"]
            },
            {
                text: "Would you cross the ocean just to see Sana smile?",
                sub: "🌊 for love...",
                correct: "Without hesitation! 🌊",
                wrongAnswers: ["Too far", "Maybe not", "Depends on weather", "No way"]
            },
            {
                text: "Is Sana the reason you smile every day?",
                sub: "😊 be honest...",
                correct: "Yes, she's my sunshine! 😊",
                wrongAnswers: ["Not really", "Other things make me smile", "Sometimes", "No"]
            },
            {
                text: "Do you want to make Sana happy forever?",
                sub: "💝 forever is a long time...",
                correct: "YES! Forever and always! 💝",
                wrongAnswers: ["I don't know", "Maybe for now", "No commitment", "Probably not"]
            },
            {
                text: "Is Sana's laugh the cutest sound ever?",
                sub: "🎵 music to my ears...",
                correct: "100% the cutest! 🎵",
                wrongAnswers: ["It's average", "No", "I prefer silence", "Not special"]
            },
            {
                text: "Do you get jealous when others talk to Sana?",
                sub: "💚 just a little?",
                correct: "Yes, because I adore her! 💚",
                wrongAnswers: ["I don't care", "No, never", "I'd be happy", "Why would I?"]
            },
            {
                text: "Is Sana worth fighting for?",
                sub: "⚔️ love is worth everything...",
                correct: "I'd fight a thousand battles! ⚔️",
                wrongAnswers: ["Probably not", "Too much effort", "She's not special", "No"]
            },
            {
                text: "Do you LOVE Sana with all your heart?",
                sub: "❤️ the final question... the most important one...",
                correct: "YES! I LOVE SANA! ❤️❤️❤️",
                wrongAnswers: ["No", "I like someone else", "Not really", "Just as a friend"]
            }
        ];

        // Game state
        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        let escapeCount = 0;
        
        // DOM elements
        const questionTextEl = document.getElementById('questionText');
        const questionSubEl = document.getElementById('questionSub');
        const answersArea = document.getElementById('answersArea');
        const progressFill = document.getElementById('progressFill');
        const questionCounter = document.getElementById('questionCounter');
        const scoreArea = document.getElementById('scoreArea');
        const nextBtn = document.getElementById('nextBtn');
        const resultsScreen = document.getElementById('resultsScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const sanaMessageEl = document.getElementById('sanaMessage');
        const restartBtn = document.getElementById('restartBtn');
        const teaseMessageEl = document.getElementById('teaseMessage');

        // Funny escape messages
        const escapeMessages = [
            "💨 Nope! Wrong answer ran away! 💨",
            "🏃‍♀️ Can't catch me! Try the right one! 🏃‍♀️",
            "😏 That's not the love answer! 😏",
            "🎯 Sana knows you want the correct one! 🎯",
            "💘 Your heart says the right answer anyway... 💘",
            "🌀 Wrong answers are slippery! 🌀",
            "🤭 Sana says: 'Pick the loving option!' 🤭",
            "⭐ Only love for Sana works here! ⭐",
            "🌈 Give up on wrong answers! 🌈",
            "💪 You know the truth — you love Sana! 💪"
        ];

        // Load current question
        function loadQuestion() {
            answered = false;
            const q = questions[currentQuestion];
            questionTextEl.textContent = q.text;
            questionSubEl.textContent = q.sub;
            
            // Combine correct + wrong answers and shuffle
            let allAnswers = [q.correct, ...q.wrongAnswers];
            allAnswers = shuffleArray(allAnswers);
            
            // Clear and render buttons
            answersArea.innerHTML = '';
            allAnswers.forEach(answer => {
                const btn = document.createElement('button');
                btn.textContent = answer;
                btn.classList.add('answer-btn');
                if (answer === q.correct) {
                    btn.classList.add('correct');
                } else {
                    btn.classList.add('wrong');
                }
                btn.addEventListener('click', () => handleAnswer(btn, answer));
                answersArea.appendChild(btn);
            });
            
            // Reset any floating button positions
            resetWrongButtonsPosition();
            nextBtn.disabled = true;
            updateProgress();
        }
        
        // Shuffle array function
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        // Update progress bar and counter
        function updateProgress() {
            const progress = ((currentQuestion) / questions.length) * 100;
            progressFill.style.width = `${progress}%`;
            questionCounter.textContent = `Question ${currentQuestion + 1} / ${questions.length}`;
            scoreArea.textContent = `❤️ Score: ${score} / ${questions.length}`;
        }
        
        // Move wrong button away (dodge effect)
        function moveWrongButton(button) {
            if (!button || button.classList.contains('correct')) return;
            
            escapeCount++;
            const areaRect = answersArea.getBoundingClientRect();
            const btnRect = button.getBoundingClientRect();
            
            // Calculate new position within answers area
            const maxX = areaRect.width - btnRect.width - 10;
            const maxY = areaRect.height - btnRect.height - 10;
            
            let newX = Math.random() * maxX;
            let newY = Math.random() * maxY;
            newX = Math.max(5, Math.min(newX, maxX));
            newY = Math.max(5, Math.min(newY, maxY));
            
            button.style.position = 'absolute';
            button.style.left = newX + 'px';
            button.style.top = newY + 'px';
            button.style.transition = 'all 0.05s linear';
            
            // Slightly shrink wrong buttons each escape
            let currentScale = 1 - (escapeCount * 0.01);
            if (currentScale < 0.7) currentScale = 0.7;
            button.style.transform = `scale(${currentScale})`;
            
            // Update tease message
            const msgIndex = Math.min(escapeCount % escapeMessages.length, escapeMessages.length - 1);
            teaseMessageEl.innerHTML = escapeMessages[msgIndex] + ` ⚡`;
            
            setTimeout(() => {
                button.style.transition = 'all 0.08s linear';
            }, 100);
        }
        
        // Reset all wrong button positions
        function resetWrongButtonsPosition() {
            const wrongBtns = document.querySelectorAll('.answer-btn.wrong');
            wrongBtns.forEach(btn => {
                btn.style.position = 'relative';
                btn.style.left = 'auto';
                btn.style.top = 'auto';
                btn.style.transform = 'scale(1)';
                btn.style.transition = 'all 0.2s ease';
            });
            escapeCount = 0;
        }
        
        // Handle answer click
        function handleAnswer(button, answerText) {
            if (answered) return;
            
            const q = questions[currentQuestion];
            const isCorrect = (answerText === q.correct);
            
            if (isCorrect) {
                // CORRECT ANSWER!
                score++;
                updateProgress();
                
                // Visual feedback
                button.style.transform = 'scale(1.1)';
                button.style.boxShadow = '0 0 30px #ff6a88';
                teaseMessageEl.innerHTML = '✅ CORRECT! ✅ You truly love Sana! 💖';
                
                // Disable all other buttons
                const allBtns = document.querySelectorAll('.answer-btn');
                allBtns.forEach(btn => {
                    btn.style.pointerEvents = 'none';
                });
                
                answered = true;
                nextBtn.disabled = false;
                
                // Create heart burst
                createHeartBurst();
                
                setTimeout(() => {
                    button.style.transform = 'scale(1)';
                }, 200);
            } else {
                // WRONG ANSWER — button runs away!
                moveWrongButton(button);
                // Flash red
                button.style.backgroundColor = '#5a2a3a';
                setTimeout(() => {
                    if (button) button.style.backgroundColor = '';
                }, 150);
            }
        }
        
        // Next question
        function nextQuestion() {
            if (!answered) return;
            
            currentQuestion++;
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                // Quiz complete! Show results
                showResults();
            }
        }
        
        // Show final results with personalized Sana message
        function showResults() {
            const finalScoreValue = score;
            finalScoreEl.textContent = `${finalScoreValue} / ${questions.length}`;
            
            let sanaMessage = "";
            if (finalScoreValue === questions.length) {
                sanaMessage = "💖 PERFECT SCORE! Sana is blushing! She loves you too! 💖";
                createMassiveHeartExplosion();
            } else if (finalScoreValue >= 8) {
                sanaMessage = "🌸 Almost perfect! Sana is very happy! Keep loving her more every day! 🌸";
            } else if (finalScoreValue >= 6) {
                sanaMessage = "💗 Good! But Sana knows you can love her even more! Try again? 💗";
            } else {
                sanaMessage = "💔 Sana says: 'I know you love me more than this... take the quiz again!' 💔";
            }
            sanaMessageEl.textContent = sanaMessage;
            resultsScreen.classList.add('active');
        }
        
        // Restart quiz
        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            answered = false;
            escapeCount = 0;
            resultsScreen.classList.remove('active');
            loadQuestion();
            updateProgress();
            teaseMessageEl.innerHTML = '💋 Wrong answers run away... try to catch them? 💋';
        }
        
        // Visual effects
        function createHeartBurst() {
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.style.position = 'fixed';
                heart.style.left = (Math.random() * window.innerWidth) + 'px';
                heart.style.top = (Math.random() * window.innerHeight) + 'px';
                heart.style.fontSize = (15 + Math.random() * 25) + 'px';
                heart.style.pointerEvents = 'none';
                heart.style.zIndex = '999';
                heart.style.animation = 'floatBg 1s ease-out forwards';
                heart.style.opacity = '0.9';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1000);
            }
        }
        
        function createMassiveHeartExplosion() {
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = ['❤️', '💖', '💗', '💘', '💝'][Math.floor(Math.random() * 5)];
                    heart.style.position = 'fixed';
                    heart.style.left = (Math.random() * window.innerWidth) + 'px';
                    heart.style.top = (Math.random() * window.innerHeight) + 'px';
                    heart.style.fontSize = (20 + Math.random() * 40) + 'px';
                    heart.style.pointerEvents = 'none';
                    heart.style.zIndex = '9999';
                    heart.style.animation = 'floatBg 1.2s ease-out forwards';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 1200);
                }, i * 15);
            }
        }
        
        // Pre-emptive mouse tracking for wrong buttons (makes them run away BEFORE click)
        function setupWrongButtonEscape() {
            document.addEventListener('mousemove', (e) => {
                const wrongBtns = document.querySelectorAll('.answer-btn.wrong');
                wrongBtns.forEach(btn => {
                    const btnRect = btn.getBoundingClientRect();
                    const mouseX = e.clientX;
                    const mouseY = e.clientY;
                    const buffer = 50;
                    
                    if (mouseX > btnRect.left - buffer && 
                        mouseX < btnRect.right + buffer &&
                        mouseY > btnRect.top - buffer && 
                        mouseY < btnRect.bottom + buffer) {
                        // Mouse is getting close — move wrong button!
                        moveWrongButton(btn);
                    }
                });
            });
        }
        
        // Background floating hearts generator
        function generateBackgroundHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('bg-heart');
                heart.innerHTML = ['❤️', '💖', '💗', '💓'][Math.floor(Math.random() * 4)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (20 + Math.random() * 50) + 'px';
                heart.style.animationDuration = (8 + Math.random() * 10) + 's';
                heart.style.animationDelay = Math.random() * 5 + 's';
                document.getElementById('bgHearts').appendChild(heart);
                setTimeout(() => heart.remove(), 15000);
            }, 800);
        }
        
        // Event listeners
        nextBtn.addEventListener('click', nextQuestion);
        restartBtn.addEventListener('click', restartQuiz);
        
        // Initialize
        loadQuestion();
        setupWrongButtonEscape();
        generateBackgroundHearts();
        
        console.log("💘 Sana's 10-question love quiz loaded — wrong answers can't escape forever!");
    </script>
</body>
</html>
